name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: rushlog-${{ matrix.label }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload Windows MSI
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: rushlog-${{ matrix.label }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Rushlog ${{ github.ref_name }}
          draft: false
          files: artifacts/**/*
          body: |
            ## Rushlog ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `Rushlog_*_aarch64.dmg` |
            | macOS (Intel) | `Rushlog_*_x64.dmg` |
            | Windows | `Rushlog_*_x64-setup.msi` |

            ### Requirements

            - **FFmpeg** must be installed on your system. The app will guide you through installation on first launch.
              - **macOS:** `brew install ffmpeg`
              - **Windows:** Download from [ffmpeg.org](https://ffmpeg.org/download.html) and add to PATH
            - [Gemini API key](https://aistudio.google.com/apikey) (free tier works)

            ### macOS — unsigned app

            After installing, run:
            ```
            xattr -cr "/Applications/Rushlog.app"
            ```

            ### Windows

            Download and run the `.msi` installer.
